services:

  # ── API (Express + Puppeteer) ──────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV:    production
      PORT:        3000
      DB_HOST:     ${DB_HOST:-192.168.1.3}
      DB_PORT:     ${DB_PORT:-5432}
      DB_NAME:     ${DB_NAME:-invoice_generator}
      DB_USER:     ${DB_USER:-nesticle8bit}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:  ${JWT_SECRET}
      UPLOAD_DIR:  uploads
    volumes:
      - uploads:/app/uploads

  # ── UI (Angular → nginx) ───────────────────────────────────────
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - api

volumes:
  uploads:

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
