server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Increase body size limit for logo/signature uploads
    client_max_body_size 15m;

    # Proxy all API requests to the backend container
    location /api/ {
        proxy_pass         http://api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy uploaded files (logos, signatures)
    location /uploads/ {
        proxy_pass         http://api:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Angular client-side routing — always serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
